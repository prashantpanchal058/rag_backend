services:
  fastapi:
    build: .
    ports:
      - "8000:10000"
    environment:
      - REDIS_URL=${REDIS_URL}
    volumes:
      - .:/app
    command: uvicorn src.main:app --host 0.0.0.0 --port 10000 --reload

  celery-worker:
    build: .
    environment:
      - REDIS_URL=${REDIS_URL}
    volumes:
      - .:/app
    command: celery -A src.services.celery_app.celery worker --loglevel=info --pool=prefork --concurrency=4