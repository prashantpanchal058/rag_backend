services:
  # 1. FastAPI Web Service
  - type: web
    name: fastapi-app
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /docs
    envVars:
      - key: REDIS_URL
        sync: false

  # 2. Celery Worker (Background Service)
  - type: worker
    name: celery-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: celery -A src.services.celery_app.celery worker --loglevel=info
    envVars:
      - key: REDIS_URL
        sync: false